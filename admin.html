<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajoux — Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--brown:#8B5E3C;--brown-lt:#A67348;--brown-dk:#5C3D22;--gold:#C8A96E;--gold-lt:#DEC48A;--beige:#EDE4D8;--beige-lt:#F5EFE6;--cream:#FAF7F2;--text:#3A2510;--text-mid:#7A5535;--text-lt:#A0896E;--white:#fff;--green:#27AE60;--red:#C0392B;}
body{background:var(--cream);font-family:"DM Sans",sans-serif;color:var(--text);min-height:100vh}
#loginScreen{position:fixed;inset:0;background:var(--brown-dk);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:28px}
#loginScreen img{height:50px;filter:brightness(0) invert(1);opacity:.9}
.login-box{background:rgba(255,255,255,.07);border:1px solid rgba(200,169,110,.2);border-radius:20px;padding:40px;width:340px;text-align:center}
.login-box h2{font-family:"Bebas Neue",sans-serif;font-size:28px;letter-spacing:.1em;color:var(--white);margin-bottom:6px}
.login-box p{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.2em;margin-bottom:28px}
.pw-input{width:100%;background:rgba(255,255,255,.09);border:1.5px solid rgba(200,169,110,.22);border-radius:10px;padding:14px 18px;font-size:14px;color:var(--white);font-family:"DM Sans",sans-serif;margin-bottom:14px;outline:none;transition:border-color .3s}
.pw-input:focus{border-color:var(--gold)}
.pw-input::placeholder{color:rgba(255,255,255,.28)}
.login-btn{width:100%;background:var(--gold);color:var(--brown-dk);border:none;border-radius:10px;padding:15px;font-family:"Bebas Neue",sans-serif;font-size:15px;letter-spacing:.28em;cursor:pointer;transition:background .3s}
.login-btn:hover{background:var(--gold-lt)}
.login-err{color:#ff6b6b;font-size:12px;margin-top:12px;min-height:18px;font-weight:500}
#adminPanel{display:none}
#adminPanel.show{display:block}
.adm-header{background:var(--brown-dk);padding:0 36px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.adm-header img{height:34px;filter:brightness(0) invert(1);opacity:.9}
.adm-header-r{display:flex;align-items:center;gap:16px}
.adm-tag{font-size:10px;letter-spacing:.35em;color:rgba(255,255,255,.4);text-transform:uppercase}
.btn-viewsite{display:flex;align-items:center;gap:6px;background:rgba(200,169,110,.12);border:1px solid rgba(200,169,110,.28);color:var(--gold-lt);padding:8px 16px;border-radius:20px;font-size:10px;letter-spacing:.12em;text-decoration:none;transition:background .3s}
.btn-viewsite:hover{background:rgba(200,169,110,.22)}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.55);padding:8px 14px;border-radius:20px;font-size:10px;cursor:pointer;transition:all .3s}
.btn-logout:hover{color:var(--white);border-color:rgba(255,255,255,.4)}
.adm-body{display:grid;grid-template-columns:330px 1fr;min-height:calc(100vh - 62px)}
.sidebar{background:var(--white);border-right:1px solid rgba(139,94,60,.1);padding:28px;overflow-y:auto;height:calc(100vh - 62px);position:sticky;top:62px}
.sidebar h2{font-family:"Bebas Neue",sans-serif;font-size:24px;letter-spacing:.08em;color:var(--text);margin-bottom:4px}
.form-sub{font-size:10px;color:var(--text-lt);letter-spacing:.2em;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-family:"Bebas Neue",sans-serif;font-size:11px;letter-spacing:.22em;color:var(--brown);text-transform:uppercase;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--beige-lt);border:1.5px solid rgba(139,94,60,.14);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--text);font-family:"DM Sans",sans-serif;outline:none;transition:border-color .3s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--brown)}
.form-textarea{resize:vertical;min-height:65px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.img-preview{width:100%;height:130px;object-fit:cover;border-radius:10px;margin-bottom:10px;display:none;border:1px solid rgba(139,94,60,.15)}
.img-preview.show{display:block}
.img-upload{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;width:100%;height:100px;border:2px dashed rgba(139,94,60,.18);border-radius:10px;cursor:pointer;transition:all .3s;text-align:center;padding:14px}
.img-upload:hover{border-color:var(--brown);background:var(--beige-lt)}
.img-upload span{font-size:10px;color:var(--text-lt);font-weight:300}
.img-upload input{display:none}
.btn-submit{width:100%;background:var(--brown);color:var(--white);border:none;border-radius:11px;padding:15px;font-family:"Bebas Neue",sans-serif;font-size:13px;letter-spacing:.28em;cursor:pointer;transition:background .3s,transform .2s;margin-top:6px}
.btn-submit:hover{background:var(--brown-lt);transform:translateY(-1px)}
.btn-submit.edit-mode{background:var(--gold);color:var(--brown-dk)}
.btn-cancel{width:100%;background:transparent;color:var(--text-lt);border:1px solid rgba(139,94,60,.18);border-radius:11px;padding:11px;font-size:11px;cursor:pointer;margin-top:8px;transition:all .3s;display:none}
.btn-cancel:hover{border-color:var(--brown);color:var(--brown)}
.success-msg{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.28);border-radius:9px;padding:11px 14px;font-size:11px;color:var(--green);text-align:center;margin-top:10px;display:none}
.success-msg.show{display:block}
.main{padding:28px 36px;overflow-y:auto}
.main-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.main-hdr h2{font-family:"Bebas Neue",sans-serif;font-size:30px;letter-spacing:.06em;color:var(--text)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:var(--white);border:1px solid rgba(139,94,60,.1);border-radius:12px;padding:18px 20px}
.stat-num{font-family:"Bebas Neue",sans-serif;font-size:34px;letter-spacing:.06em;color:var(--brown);line-height:1}
.stat-lbl{font-size:10px;color:var(--text-lt);letter-spacing:.18em;text-transform:uppercase;margin-top:3px}
.search-bar{position:relative;margin-bottom:20px}
.search-bar input{width:100%;background:var(--white);border:1.5px solid rgba(139,94,60,.14);border-radius:11px;padding:11px 14px 11px 40px;font-size:12px;outline:none;transition:border-color .3s;font-family:"DM Sans",sans-serif}
.search-bar input:focus{border-color:var(--brown)}
.search-bar span{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-lt)}
.adm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.adm-card{background:var(--white);border:1px solid rgba(139,94,60,.1);border-radius:15px;overflow:hidden;transition:box-shadow .3s}
.adm-card:hover{box-shadow:0 8px 28px rgba(139,94,60,.12)}
.adm-card-img{height:150px;background:var(--beige);display:flex;align-items:center;justify-content:center;font-size:48px;overflow:hidden}
.adm-card-img img{width:100%;height:100%;object-fit:cover}
.adm-card-body{padding:14px}
.adm-ref{font-size:9px;font-weight:600;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.adm-name{font-family:"Bebas Neue",sans-serif;font-size:17px;letter-spacing:.05em;color:var(--text);margin-bottom:3px}
.adm-cat{font-size:10px;color:var(--text-lt);margin-bottom:7px}
.adm-price{font-family:"DM Sans",sans-serif;font-size:18px;font-weight:600;color:var(--brown);margin-bottom:10px}
.adm-actions{display:flex;gap:7px}
.btn-edit{flex:1;background:var(--beige-lt);color:var(--brown);border:1px solid rgba(139,94,60,.18);border-radius:8px;padding:8px;font-size:11px;cursor:pointer;transition:all .3s;font-family:"DM Sans",sans-serif}
.btn-edit:hover{background:var(--beige);border-color:var(--brown)}
.btn-del{background:rgba(192,57,43,.07);color:var(--red);border:1px solid rgba(192,57,43,.18);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;transition:all .3s}
.btn-del:hover{background:rgba(192,57,43,.14)}
.empty-state{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--text-lt);font-style:italic;font-size:19px}
.saving-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:white;font-size:16px}
.saving-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--brown-dk);color:var(--white);padding:13px 20px;border-radius:11px;font-size:12px;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.2);transform:translateY(20px);opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:860px){.adm-body{grid-template-columns:1fr}.sidebar{position:static;height:auto}.main{padding:20px}}
</style>
</head>

<script>

var DB_URL = "https://ajouxbijouterie-de327-default-rtdb.firebaseio.com";

function dbFetch(cb) {
  fetch(DB_URL + "/products.json")
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (!data) { cb([]); return; }
      var arr = Object.keys(data).map(function(k){
        var p = data[k]; p._key = k; return p;
      });
      arr.sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });
      cb(arr);
    })
    .catch(function(){ cb([]); });
}

function dbSave(product, cb) {
  var url = product._key
    ? DB_URL + "/products/" + product._key + ".json"
    : DB_URL + "/products.json";
  var method = product._key ? "PUT" : "POST";
  var data = Object.assign({}, product);
  delete data._key;
  fetch(url, { method: method, body: JSON.stringify(data) })
    .then(function(r){ return r.json(); })
    .then(function(){ if(cb) cb(); })
    .catch(function(e){ console.error(e); });
}

function dbDelete(key, cb) {
  fetch(DB_URL + "/products/" + key + ".json", { method: "DELETE" })
    .then(function(){ if(cb) cb(); })
    .catch(function(e){ console.error(e); });
}


var PASS = "ajoux2025";
var products = [];
var editImg = null;

// LOGIN
document.getElementById("loginBtn").addEventListener("click", doLogin);
document.getElementById("pwInput").addEventListener("keydown", function(e){ if(e.key==="Enter") doLogin(); });

function doLogin() {
  var val = document.getElementById("pwInput").value;
  if (val === PASS) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("adminPanel").classList.add("show");
    loadProducts();
  } else {
    document.getElementById("loginErr").textContent = "Mot de passe incorrect ✕";
    document.getElementById("pwInput").value = "";
    document.getElementById("pwInput").focus();
  }
}

document.getElementById("logoutBtn").addEventListener("click", function() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("adminPanel").classList.remove("show");
  document.getElementById("pwInput").value = "";
});

// IMAGE
document.getElementById("imgInput").addEventListener("change", function() {
  var file = this.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    editImg = e.target.result;
    var prev = document.getElementById("imgPreview");
    prev.src = e.target.result; prev.classList.add("show");
  };
  reader.readAsDataURL(file);
});

// LOAD
function loadProducts() {
  dbFetch(function(data) {
    products = data;
    renderGrid();
    updateStats();
  });
}

// SUBMIT
document.getElementById("btnSubmit").addEventListener("click", submitProduct);
document.getElementById("btnCancel").addEventListener("click", cancelEdit);
document.getElementById("searchInput").addEventListener("input", renderGrid);

function submitProduct() {
  var key     = document.getElementById("editKey").value;
  var name    = document.getElementById("fName").value.trim();
  var ref     = document.getElementById("fRef").value.trim();
  var cat     = document.getElementById("fCat").value;
  var price   = document.getElementById("fPrice").value.trim();
  var desc    = document.getElementById("fDesc").value.trim();
  var badge   = document.getElementById("fBadge").value;
  var ambName = document.getElementById("fAmbName").value.trim();
  var ambPhone= document.getElementById("fAmbPhone").value.trim();
  if(!name||!ref||!price||!ambName||!ambPhone) { showToast("⚠ Remplissez tous les champs *"); return; }

  var product = {
    name:name, ref:ref, category:cat, price:price,
    description:desc, badge:badge,
    ambassador_name:ambName, ambassador_phone:ambPhone,
    image: editImg || (key ? (products.find(function(p){return p._key===key})||{}).image||"" : ""),
    createdAt: key ? ((products.find(function(p){return p._key===key})||{}).createdAt||Date.now()) : Date.now()
  };
  if(key) product._key = key;

  document.getElementById("savingOverlay").classList.add("show");
  dbSave(product, function() {
    document.getElementById("savingOverlay").classList.remove("show");
    showToast(key ? "✓ Produit modifié !" : "✓ Produit ajouté !");
    if(key) cancelEdit(); else resetForm();
    loadProducts();
  });
}

function cancelEdit() {
  document.getElementById("editKey").value = "";
  document.getElementById("formTitle").textContent = "Ajouter";
  document.getElementById("formSub").textContent = "✦ Nouveau produit";
  document.getElementById("btnSubmit").textContent = "✦ Ajouter le produit";
  document.getElementById("btnSubmit").classList.remove("edit-mode");
  document.getElementById("btnCancel").style.display = "none";
  resetForm();
}

function resetForm() {
  ["fName","fRef","fPrice","fDesc","fAmbName","fAmbPhone"].forEach(function(id){ document.getElementById(id).value=""; });
  document.getElementById("fBadge").value = "";
  document.getElementById("fCat").selectedIndex = 0;
  document.getElementById("imgPreview").classList.remove("show");
  document.getElementById("editKey").value = "";
  document.getElementById("imgInput").value = "";
  editImg = null;
  var s=document.getElementById("successMsg"); s.classList.add("show");
  setTimeout(function(){ s.classList.remove("show"); }, 2500);
}

function editProduct(key) {
  var p = products.find(function(x){ return x._key===key; });
  if(!p) return;
  document.getElementById("editKey").value = key;
  document.getElementById("fName").value = p.name||"";
  document.getElementById("fRef").value = p.ref||"";
  document.getElementById("fPrice").value = p.price||"";
  document.getElementById("fDesc").value = p.description||"";
  document.getElementById("fBadge").value = p.badge||"";
  document.getElementById("fAmbName").value = p.ambassador_name||"";
  document.getElementById("fAmbPhone").value = p.ambassador_phone||"";
  document.getElementById("fCat").value = p.category||"Bracelets";
  if(p.image){ var prev=document.getElementById("imgPreview"); prev.src=p.image; prev.classList.add("show"); }
  editImg = null;
  document.getElementById("formTitle").textContent = "Modifier";
  document.getElementById("formSub").textContent = "✦ Modification";
  document.getElementById("btnSubmit").textContent = "✦ Sauvegarder";
  document.getElementById("btnSubmit").classList.add("edit-mode");
  document.getElementById("btnCancel").style.display = "block";
  document.querySelector(".sidebar").scrollTo({top:0,behavior:"smooth"});
}

function deleteProduct(key) {
  if(!confirm("Supprimer ce produit définitivement ?")) return;
  document.getElementById("savingOverlay").classList.add("show");
  dbDelete(key, function() {
    document.getElementById("savingOverlay").classList.remove("show");
    showToast("🗑 Produit supprimé");
    loadProducts();
  });
}

function renderGrid() {
  var q = (document.getElementById("searchInput").value||"").toLowerCase();
  var list = q ? products.filter(function(p){ return (p.name+p.ref+p.category).toLowerCase().indexOf(q)>-1; }) : products;
  var grid = document.getElementById("admGrid");
  if(!list.length) { grid.innerHTML='<div class="empty-state">'+(q?"Aucun résultat":"Aucun produit.<br>Ajoutez votre premier bijou ✨")+"</div>"; return; }
  grid.innerHTML = list.map(function(p) {
    var img = p.image ? '<img src="'+p.image+'" alt="'+p.name+'">' : "💎";
    return '<div class="adm-card"><div class="adm-card-img">'+img+'</div><div class="adm-card-body"><div class="adm-ref">Réf. '+p.ref+'</div><div class="adm-name">'+p.name+'</div><div class="adm-cat">'+p.category+(p.badge?' · <b>'+p.badge+'</b>':"")+'</div><div class="adm-price">'+p.price+' $</div><div class="adm-actions"><button class="btn-edit" onclick="editProduct(''+p._key+'')">✏ Modifier</button><button class="btn-del" onclick="deleteProduct(''+p._key+'')">🗑</button></div></div></div>';
  }).join("");
}

function updateStats() {
  document.getElementById("stTotal").textContent = products.length;
  document.getElementById("stCats").textContent = new Set(products.map(function(p){ return p.category; })).size;
  document.getElementById("stAmbs").textContent = new Set(products.map(function(p){ return p.ambassador_name; }).filter(Boolean)).size;
}

function showToast(msg) {
  var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 3000);
}
</script>
</body>
</html>
